name: Package

# Empaqueta el cliente de escritorio a ejecutables nativos (ADR-0013).
# PyInstaller NO cross-compila: se construye en cada SO con una matriz.
# No corre en cada PR (gasta minutos): solo manual o al publicar un tag vX.Y.Z.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write  # necesario para adjuntar binarios a un Release en tags

jobs:
  build:
    name: Ejecutable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: citysim-desktop-linux
          - os: windows-latest
            asset: citysim-desktop-windows.exe
          - os: macos-latest
            asset: citysim-desktop-macos
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + ui + build deps
        run: pip install -e ".[ui,build]"

      - name: Build executable
        run: pyinstaller packaging/citysim-desktop.spec

      - name: Smoke run del binario
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            BIN="dist/citysim-desktop.exe"
          else
            BIN="dist/citysim-desktop"
            chmod +x "$BIN"
          fi
          "$BIN" --smoke
          echo "smoke exit: $?"

      - name: Renombrar binario al nombre del asset
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv "dist/citysim-desktop.exe" "dist/${{ matrix.asset }}"
          else
            mv "dist/citysim-desktop" "dist/${{ matrix.asset }}"
          fi

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

      - name: Adjuntar al Release (solo en tags vX.Y.Z)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
