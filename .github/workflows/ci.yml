name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs viejos de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -q

  docker:
    name: Docker build & smoke run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test stage (corre pytest dentro del contenedor)
        run: docker build --target test -t citysim:test .

      - name: Build runtime image
        run: docker build --target runtime -t citysim:latest .

      - name: Smoke run (5 días de simulación)
        run: docker run --rm citysim:latest --days 5
